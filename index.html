<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Social Radar</title>
    <style>
        body {
            background-color: #050f05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 左上角設定按鈕 */
        #settings-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            font-size: 24px;
            border-radius: 5px;
            z-index: 5;
        }

        #radar-circle {
            width: 250px;
            height: 250px;
            border: 3px solid #00ff00;
            border-radius: 50%;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 0 20px #00ff00;
        }
        #radar-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: #00ff00;
            transform-origin: left center;
            animation: sweep 2s linear infinite;
            display: none;
        }
        .scanning #radar-circle::after {
            display: block;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        button {
            background-color: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff00;
            border-radius: 5px;
            margin: 10px 0;
        }
        button:active {
            background-color: #00ff00;
            color: #050f05;
        }

        /* 緊急停止按鈕樣式 */
        #stop-btn {
            border: 2px solid #ff0000;
            color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            display: none;
        }
        #stop-btn:active {
            background-color: #ff0000;
            color: #050f05;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
            min-height: 24px;
        }

        /* 設定視窗 Modal 樣式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 15, 5, 0.9);
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background-color: #050f05;
            margin: 8% auto;
            padding: 20px;
            border: 2px solid #00ff00;
            width: 85%;
            max-width: 400px;
            text-align: left;
            border-radius: 10px;
            box-shadow: 0 0 20px #00ff00;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-top: 0;
            text-align: center;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }
        .modal-content h4 {
            margin: 15px 0 10px 0;
            color: #adff2f;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 5px;
        }
        .radio-container {
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
            line-height: 1.4;
            font-size: 16px;
        }
        .radio-container input {
            margin-right: 10px;
            accent-color: #00ff00;
        }
        #custom-text {
            background-color: #050f05;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px;
            width: calc(100% - 20px);
            margin-top: 8px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
        }
        #custom-text:focus {
            outline: none;
            box-shadow: 0 0 8px #00ff00;
        }
        .modal-close-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <button id="settings-btn" onclick="openSettings()">≡</button>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>系統設定中心</h3>
            
            <h4>1. 探測目標語句</h4>
            <label class="radio-container">
                <input type="radio" name="phrase" value="0" checked>
                1. 探測到不正常人類，探測到不正常人類，請提高警覺，切勿進行溝通，並且盡快聯絡不正常人類研究所。
            </label>
            <label class="radio-container">
                <input type="radio" name="phrase" value="1">
                2. 探測到一個好人，快啲讚佢。
            </label>
            <label class="radio-container">
                <input type="radio" name="phrase" value="2">
                3. 探測到一個衰人，快啲走避，唔好俾佢發現。
            </label>
            <label class="radio-container">
                <input type="radio" name="phrase" value="3">
                4. 探測到你老婆唔高興，快啲讚佢靚女。
            </label>
            <label class="radio-container">
                <input type="radio" name="phrase" value="4">
                5. 實在係神奇、頂級、超卓，有今生冇來世。
            </label>
            <label class="radio-container">
                <input type="radio" name="phrase" value="5">
                6. 探測到一名正宗貓奴，快啲讚佢隻貓係全世界最可愛。
            </label>
            <label class="radio-container">
                <input type="radio" name="phrase" value="custom" id="custom-radio">
                7. 自訂語句：
                <input type="text" id="custom-text" maxlength="40" placeholder="最多輸入 40 個字..." onfocus="selectCustomRadio()">
            </label>

            <h4>2. 廣播員口音設定</h4>
            <label class="radio-container">
                <input type="radio" name="voice-style" value="female-robot" checked>
                機械人
            </label>
            <label class="radio-container">
                <input type="radio" name="voice-style" value="male-uk">
                英國口音(英文字only)
            </label>

            <button class="modal-close-btn" onclick="closeSettings()">儲存並關閉</button>
        </div>
    </div>

    <div id="radar-circle"></div>
    <button id="scan-btn" onclick="startRadar()">啟動探測器</button>
    <button id="stop-btn" onclick="stopRadar()">停止</button>
    <div id="status">系統閒置中</div>

<script>
    const phrases = [
        "探測到不正常人類，探測到不正常人類，請提高警覺，切勿進行溝通，並且盡快聯絡不正常人類研究所",
        "探測到一個好人，快啲讚佢。",
        "探測到一個衰人，快啲走避，唔好俾佢發現。",
        "探測到你老婆唔高興，快啲讚佢靚女。",
        "實在係神奇、頂級、超卓，有今生冇來世。",
        "探測到一名正宗貓奴，快啲讚佢隻貓係全世界最可愛。"
    ];

    let audioCtx = null;
    let beepInterval = null;
    let scanTimeout = null;

    function openSettings() {
        document.getElementById('settings-modal').style.display = 'block';
    }
    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }
    function selectCustomRadio() {
        document.getElementById('custom-radio').checked = true;
    }

    function playRadarBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    function startRadar() {
        const btn = document.getElementById('scan-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusText = document.getElementById('status');
        
        document.body.classList.add('scanning');
        btn.disabled = true;
        stopBtn.style.display = 'inline-block';
        statusText.innerText = "正在掃描周邊環境...";

        if ('speechSynthesis' in window) {
            let unlockUtterance = new SpeechSynthesisUtterance('');
            unlockUtterance.volume = 0;
            window.speechSynthesis.speak(unlockUtterance);
        }

        playRadarBeep();
        beepInterval = setInterval(playRadarBeep, 1000);

        scanTimeout = setTimeout(() => {
            clearInterval(beepInterval);
            document.body.classList.remove('scanning');
            
            let selectedValue = document.querySelector('input[name="phrase"]:checked').value;
            let phraseToSpeak = "";
            
            if (selectedValue === "custom") {
                phraseToSpeak = document.getElementById('custom-text').value.trim();
                if (!phraseToSpeak) phraseToSpeak = "你冇輸入任何自訂語句";
            } else {
                phraseToSpeak = phrases[parseInt(selectedValue)];
            }
            
            statusText.innerText = "成功鎖定目標，正在廣播...";
            
            speak(phraseToSpeak, () => {
                btn.disabled = false;
                stopBtn.style.display = 'none';
                statusText.innerText = "系統閒置中";
            });
        }, 5000);
    }

    function stopRadar() {
        if (beepInterval) clearInterval(beepInterval);
        if (scanTimeout) clearTimeout(scanTimeout);
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
        
        document.body.classList.remove('scanning');
        document.getElementById('scan-btn').disabled = false;
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('status').innerText = "系統已安全終止。";
        
        setTimeout(() => {
            if (document.getElementById('status').innerText === "系統已安全終止。") {
                document.getElementById('status').innerText = "系統閒置中";
            }
        }, 2000);
    }

    function speak(text, callback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const selectedStyle = document.querySelector('input[name="voice-style"]:checked').value;

            if (selectedStyle === 'male-uk') {
                utterance.lang = 'en-GB'; 
                
                // 【男聲音質優化】層次式尋找最渾厚的英國男聲
                let ukVoice = voices.find(v => v.lang.includes('GB') && 
                    (v.name.toLowerCase().includes('male') || 
                     v.name.toLowerCase().includes('daniel') || 
                     v.name.toLowerCase().includes('google') ||
                     v.name.toLowerCase().includes('low') ||
                     v.name.toLowerCase().includes('premium'))
                );
                
                // 如果找不到指定名稱，就拿任何一個英國語音
                if (!ukVoice) ukVoice = voices.find(v => v.lang.includes('GB') || v.lang.startsWith('en-G'));
                if (ukVoice) utterance.voice = ukVoice;
                
                // 【核心厚實度調整】
                utterance.pitch = 0.55;  // 音調明顯降低，營造出成熟低沉、厚實的胸腔共鳴感
                utterance.rate = 0.80;   // 速度放慢，顯得更沉穩有磁性
            } else {
                // 女聲機械人保持原本設定
                utterance.lang = 'zh-HK'; 
                let hkVoice = voices.find(voice => voice.lang === 'zh-HK' || voice.lang.includes('HK') || voice.lang.includes('zh-M'));
                if (hkVoice) utterance.voice = hkVoice;

                utterance.rate = 0.85;   
                utterance.pitch = 0.55;  
            }

            utterance.volume = 1.0;  
            utterance.onend = callback;
            
            utterance.onerror = () => {
                document.getElementById('scan-btn').disabled = false;
                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('status').innerText = "系統閒置中";
            };

            window.speechSynthesis.speak(utterance);
        } else {
            callback();
        }
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }
</script>
<script data-goatcounter="https://socialradar.goatcounter.com/count"
        async src="//gc.zgo.at/count.js">
</script>
</body>
</html>
