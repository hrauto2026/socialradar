<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Social Radar</title>
    <style>
        body {
            background-color: #050f05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }
        #radar-circle {
            width: 250px;
            height: 250px;
            border: 3px solid #00ff00;
            border-radius: 50%;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 0 20px #00ff00;
        }
        #radar-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: #00ff00;
            transform-origin: left center;
            animation: sweep 2s linear infinite;
            display: none;
        }
        .scanning #radar-circle::after {
            display: block;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        button {
            background-color: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff00;
            border-radius: 5px;
        }
        button:active {
            background-color: #00ff00;
            color: #050f05;
        }
        #status {
            margin-top: 20px;
            font-size: 20px;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div id="radar-circle"></div>
    <button id="scan-btn" onclick="startRadar()">啟動防禦雷達</button>
    <div id="status">系統閒置</div>

<script>
    // 嚴格 12 字廣東話清單
    const outrageousItems = [
        "一個好有攻擊性嘅多士爐",
	    "一隻雙碩士畢業嘅小強",
    	"一對怨氣重嘅未洗臭襪",
    	"一個鐘意食日本菜嘅四腳爬爬",
    	"一粒被煮咗三日都賣唔出嘅咖喱魚蛋",
    	"一位想同你做街頭問卷嘅松鼠",
    	"一位叫叉燒飯走叉燒嘅外星人",
    	"一兜釋放緊高濃度負能量隔夜嘅齋滷味",
    	"一隻成晚冇瞓嘅貓店長"
    ];

    let audioCtx = null;
    let beepInterval = null;

    function playRadarBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    function startRadar() {
        const btn = document.getElementById('scan-btn');
        const statusText = document.getElementById('status');
        
        document.body.classList.add('scanning');
        btn.disabled = true;
        statusText.innerText = "正在掃描周邊環境...";

        // 【iOS 核心修正 1】：在使用者點擊的這一刻，立刻用一個空白聲音騙過並解鎖 iOS 語音系統
        if ('speechSynthesis' in window) {
            let unlockUtterance = new SpeechSynthesisUtterance('');
            unlockUtterance.volume = 0;
            window.speechSynthesis.speak(unlockUtterance);
        }

        playRadarBeep();
        beepInterval = setInterval(playRadarBeep, 1000);

        setTimeout(() => {
            clearInterval(beepInterval);
            document.body.classList.remove('scanning');
            
            const randomItem = outrageousItems[Math.floor(Math.random() * outrageousItems.length)];
            const phraseToSpeak = `探測到異常物件可能係${randomItem}或者人類，請提高警覺，切勿進行溝通`;
            
            statusText.innerText = "成功鎖定目標。";
            
            speak(phraseToSpeak, () => {
                btn.disabled = false;
                statusText.innerText = "系統閒置";
            });
        }, 5000);
    }

    function speak(text, callback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // 確保乾淨
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // 強制設定為香港廣東話
            utterance.lang = 'zh-HK'; 

            // 【iOS 核心修正 2】：更加寬鬆的安全語音包尋找機制，防範 iOS 改版導致找不到聲音卡死
            const voices = window.speechSynthesis.getVoices();
            const hkVoice = voices.find(voice => voice.lang === 'zh-HK' || voice.lang.includes('HK') || voice.lang.includes('zh-M'));
            if (hkVoice) {
                utterance.voice = hkVoice;
            }

            // 冷酷機械感參數
            utterance.rate = 0.85;   
            utterance.pitch = 0.75;  
            utterance.volume = 1.0;  

            utterance.onend = callback;
            
            // 如果遇到不可預期的錯誤，強制釋放按鈕
            utterance.onerror = () => {
                btn.disabled = false;
                document.getElementById('status').innerText = "系統閒置";
            };

            window.speechSynthesis.speak(utterance);
        } else {
            callback();
        }
    }

    // 初始化加載語音包
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }
</script>
<script data-goatcounter="https://socialradar.goatcounter.com/count"
        async src="//gc.zgo.at/count.js">
</script>
</body>
</html>
