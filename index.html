<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Social Radar</title>
    <style>
        body {
            background-color: #050f05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        #radar-circle {
            width: 250px;
            height: 250px;
            border: 3px solid #00ff00;
            border-radius: 50%;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 0 20px #00ff00;
        }
        /* Fake radar sweep line */
        #radar-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: #00ff00;
            transform-origin: left center;
            animation: sweep 2s linear infinite;
            display: none;
        }
        .scanning #radar-circle::after {
            display: block;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        button {
            background-color: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff00;
            border-radius: 5px;
        }
        button:active {
            background-color: #00ff00;
            color: #050f05;
        }
        #status {
            margin-top: 20px;
            font-size: 20px;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div id="radar-circle"></div>
    <button id="scan-btn" onclick="startRadar()">INITIALIZE SCAN</button>
    <div id="status">SYSTEM IDLE</div>

<script>
    // Array of outrageous items
    const outrageousItems = [
        "a highly aggressive sentient toaster",
        "a wild raccoon wielding a clipboard",
        "an unauthorized pile of laundry",
        "a localized low-patience field",
        "a cardboard cutout of Nicolas Cage",
        "a suspicious hovering cabbage"
    ];

    let audioCtx = null;
    let beepInterval = null;

    function playRadarBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    function startRadar() {
        const btn = document.getElementById('scan-btn');
        const statusText = document.getElementById('status');
        
        document.body.classList.add('scanning');
        btn.disabled = true;
        statusText.innerText = "SCANNING ENVIRONMENT...";

        playRadarBeep();
        beepInterval = setInterval(playRadarBeep, 1000);

        setTimeout(() => {
            clearInterval(beepInterval);
            document.body.classList.remove('scanning');
            
            const randomItem = outrageousItems[Math.floor(Math.random() * outrageousItems.length)];
            const phraseToSpeak = `External object detected. Probably ${randomItem}... or a human.  Use caution.  Avoid contact.`;
            
            statusText.innerText = "TARGET IDENTIFIED.";
            speak(phraseToSpeak, () => {
                btn.disabled = false;
                statusText.innerText = "READY TO DEPOLY";
            });
        }, 5000);
    }

    // UPDATED ENGINE FOR BRITISH ROBOT VOICE
    function speak(text, callback) {
        const utterance = new SpeechSynthesisUtterance(text);
        
        // 1. Force the language profile to British English
        utterance.lang = 'en-GB'; 

        // 2. Scan your iPhone specifically for an English-UK voice profile
        const voices = window.speechSynthesis.getVoices();
        const ukVoice = voices.find(voice => voice.lang === 'en-GB' || voice.lang.startsWith('en-GB'));
        if (ukVoice) {
            utterance.voice = ukVoice;
        }

        // 3. ROBOTIC AUDIO SETTINGS (Tweak these variables to experiment!)
        utterance.rate = 0.82;   // Speed: Lower than 1.0 makes it slow, calculated, and eerie
        utterance.pitch = 0.65;  // Pitch: Dropping this creates a heavy, metallic monotone depth
        utterance.volume = 1.0;  // Volume: Max output

        utterance.onend = callback;
        window.speechSynthesis.speak(utterance);
    }

    // Crucial fix for iOS Safari: Pre-loading the voice engine on launch
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }
</script>
<script data-goatcounter="https://socialradar.goatcounter.com/count"
        async src="//gc.zgo.at/count.js">
</script>
</body>
</html>
